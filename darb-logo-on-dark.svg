<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 470" role="img" aria-label="Darb Tyres Trading">
  <defs>
    <linearGradient id="road2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2c2520"/>
      <stop offset="100%" stop-color="#15120F" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="roadclip2"><polygon points="284,206 336,206 470,332 150,332"/></clipPath>
    <style>
      @keyframes darbflow2 { from { transform: translateY(0); } to { transform: translateY(32px); } }
      .laneG2 { animation: darbflow2 .7s linear infinite; }
      @media (prefers-reduced-motion: reduce){ .laneG2 { animation: none; } }
    </style>
  </defs>

  <polygon points="284,206 336,206 470,332 150,332" fill="url(#road2)"/>
  <g clip-path="url(#roadclip2)">
    <g class="laneG2" fill="#e40521">
      <rect x="298" y="184" width="26" height="16" rx="1"/>
      <rect x="298" y="216" width="26" height="16" rx="1"/>
      <rect x="298" y="248" width="26" height="16" rx="1"/>
      <rect x="298" y="280" width="26" height="16" rx="1"/>
      <rect x="298" y="312" width="26" height="16" rx="1"/>
    </g>
  </g>

  <text x="312" y="180" text-anchor="middle" font-family="'Saira Condensed','Arial Narrow',sans-serif"
        font-weight="900" font-style="italic" font-size="150" letter-spacing="2" fill="#F4F1EB">DARB</text>

  <rect x="170" y="349" width="40" height="6" fill="#e40521"/>
  <rect x="412" y="349" width="40" height="6" fill="#e40521"/>
  <text x="311" y="362" text-anchor="middle" font-family="'Saira Condensed','Arial Narrow',sans-serif"
        font-weight="800" font-size="40" letter-spacing="11" fill="#F4F1EB">TYRES TRADING</text>

  <text x="311" y="412" text-anchor="middle" font-family="'Tajawal','Segoe UI',Arial,sans-serif"
        font-weight="700" font-size="30" fill="#9a948c" direction="rtl">درب لتجارة الإطارات</text>

  <text x="311" y="452" text-anchor="middle" font-family="Arial,sans-serif"
        font-weight="600" font-size="15" letter-spacing="4" fill="#8C8780">WHOLESALE TYRE DISTRIBUTION · B2B SUPPLY</text>
</svg>
